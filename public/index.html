<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Claude Arena</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>⚔️</text></svg>" />
<link rel="stylesheet" href="/style.css" />
</head>
<body data-skin="rts">
  <canvas id="stage"></canvas>

  <!-- top-left title + live -->
  <header id="topbar">
    <div class="brand">
      <span class="logo">⚔</span>
      <div>
        <div class="title">CLAUDE ARENA</div>
        <div class="subtitle">a living map of your projects</div>
      </div>
    </div>
    <div class="live"><span id="live-dot" class="dot"></span>LIVE</div>
  </header>

  <!-- HUD stats -->
  <div id="hud">
    <div class="stat"><div class="num" id="hud-factions">0</div><div class="lbl">tribes</div></div>
    <div class="stat"><div class="num" id="hud-units">0</div><div class="lbl">avatars</div></div>
    <div class="stat"><div class="num" id="hud-drones">0</div><div class="lbl">subagents</div></div>
  </div>

  <!-- skin switcher -->
  <div id="skins"></div>

  <!-- toolbar -->
  <div id="toolbar">
    <button id="btn-frame" title="Frame all (R)">⤢ Frame</button>
    <button id="btn-plant" title="Plant a sapling in a town — it grows as the project works">🌱 Plant</button>
    <button id="btn-history" title="Watch the whole history as a time-lapse">⏳ History</button>
    <button id="btn-demo" title="Inject a burst of demo life">✦ Demo</button>
    <button id="btn-shot" title="Save a postcard">⤓ Shot</button>
  </div>

  <!-- time-lapse replay controls -->
  <div id="replay">
    <button id="rp-play" title="Play / pause">▶</button>
    <div class="rp-mid">
      <div class="rp-top"><span id="rp-when">—</span><span id="rp-speedlbl"></span></div>
      <input id="rp-scrub" type="range" min="0" max="1000" value="1000" step="1" />
    </div>
    <div class="rp-speeds">
      <button data-sp="0.5">½h/s</button>
      <button data-sp="6">6h/s</button>
      <button data-sp="24" class="on">1d/s</button>
      <button data-sp="120">5d/s</button>
    </div>
    <button id="rp-live" title="Return to live">● LIVE</button>
  </div>

  <!-- ticker -->
  <div id="ticker-wrap"><div id="ticker"></div></div>

  <!-- hint -->
  <div id="hint">drag to pan · scroll to zoom · click a town to inspect &amp; curate</div>

  <!-- unit hover tooltip -->
  <div id="unit-tip"></div>

  <!-- "town crier": what changed since you last looked -->
  <div id="crier"><div id="crier-body"></div><button id="crier-x">✕</button></div>

  <!-- faction / town panel -->
  <aside id="curate">
    <div class="c-head">
      <span id="c-swatch" class="swatch"></span>
      <div class="c-title">
        <div id="f-name-disp">Tribe</div>
        <div id="f-sub" class="c-sub">—</div>
      </div>
      <button id="c-close" class="x">✕</button>
    </div>
    <div id="f-motto" class="f-motto"></div>
    <div id="f-stats" class="f-stats"></div>
    <div class="f-section">
      <div class="f-h">⚔ Heroes <span id="f-herocount" class="dim"></span></div>
      <div id="f-heroes" class="f-heroes"></div>
    </div>
    <details class="f-customize">
      <summary>✎ Customize tribe</summary>
      <label>Name<input id="c-name" type="text" maxlength="40" /></label>
      <label>Motto<input id="c-motto" type="text" maxlength="60" placeholder="optional battle cry" /></label>
      <label>Banner colour</label>
      <div id="c-hues" class="swatches"></div>
      <label>Crest</label>
      <div id="c-crests" class="crestgrid"></div>
      <input id="c-hue" type="hidden" /><input id="c-crest" type="hidden" />
      <button id="c-save" class="save">Save tribe</button>
    </details>
  </aside>

  <script src="/util.js"></script>
  <script src="/art.js"></script>
  <script src="/lore.js"></script>
  <script src="/sim.js"></script>
  <script src="/replay.js"></script>
  <script src="/renderers/rts.js"></script>
  <script src="/game.js"></script>
</body>
</html>
